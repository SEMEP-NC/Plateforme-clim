services:

  web:
    build: ./web
    container_name: clim_web
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./web/src:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: clim_manager
      DB_USER: climuser
      DB_PASSWORD: climpassword

  api:
    build: ./api
    container_name: clim_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - modbus-hub
  db:
    image: mariadb:11
    restart: always
    container_name: clim_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: clim_manager
      MYSQL_USER: climuser
      MYSQL_PASSWORD: climpassword

    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
#    ports:
#      - "3306:3306"

  scheduler:
    build: ./scheduler
    container_name: clim_scheduler
    ports:
    - "5001:5001"
    restart: always
    depends_on:
      db:
        condition: service_healthy

  modbus-hub:
    build: ./modbus-hub
    container_name: modbus_hub
    ports:
      - "8500:8500"
    restart: always

volumes:
  db_data: